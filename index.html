<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MoneyBook — 나의 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#191919;--surface2:#222222;--surface3:#2a2a2a;
  --border:#2f2f2f;--border2:#3a3a3a;--text:#f0ede8;--text2:#9a9590;--text3:#5a5650;
  --accent:#e8c547;--income:#4ade9a;--income-bg:#0d2a1c;
  --expense:#ff6b6b;--expense-bg:#2a0d0d;--r:12px;--r-sm:8px;--mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:200;background:rgba(15,15,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{font-size:18px;font-weight:900;letter-spacing:-1px}.logo span{color:var(--accent)}
.today-badge{font-family:var(--mono);font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.tabs{display:flex;gap:2px;padding:1.25rem 1.5rem 0;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:56px;z-index:100;}
.tab{padding:10px 20px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;letter-spacing:0.3px;}
.tab:hover{color:var(--text2)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.main{max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 6rem}
.section{display:none;animation:fadeUp .25s ease}.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;position:relative;overflow:hidden;}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sum-card.total::before{background:var(--accent)}.sum-card.income::before{background:var(--income)}.sum-card.expense::before{background:var(--expense)}
.sum-label{font-size:11px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.sum-value{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.sum-card.total .sum-value{color:var(--accent)}.sum-card.income .sum-value{color:var(--income)}.sum-card.expense .sum-value{color:var(--expense)}
.sum-sub{font-size:11px;color:var(--text3);margin-top:5px;font-family:var(--mono)}

/* NAV */
.nav-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.nav-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.nav-btns{display:flex;gap:6px}
.btn-nav{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-nav:hover{background:var(--surface2);color:var(--text)}
.btn-today{padding:0 12px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-today:hover{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* WEEK */
.week-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem}
.week-day-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
.week-day-row:hover{border-color:var(--border2)}.week-day-row.today-row{border-color:var(--accent);border-width:1.5px}
.week-day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;user-select:none;}
.week-day-header:hover{background:var(--surface2)}
.day-num{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--mono);font-size:14px;font-weight:500;background:var(--surface2);color:var(--text2);}
.today-row .day-num{background:var(--accent);color:#000;font-weight:700}
.day-name{font-size:12px;color:var(--text2);width:28px;flex-shrink:0}
.day-sun .day-name{color:#ff6b6b}.day-sat .day-name{color:#6b9eff}
.day-transactions{flex:1;display:flex;flex-wrap:wrap;gap:5px;min-width:0}
.tx-chip{font-size:11px;padding:3px 8px;border-radius:20px;font-family:var(--mono);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;}
.tx-chip.income{background:var(--income-bg);color:var(--income);border:1px solid rgba(74,222,154,.2)}
.tx-chip.expense{background:var(--expense-bg);color:var(--expense);border:1px solid rgba(255,107,107,.2)}
.day-balance{font-family:var(--mono);font-size:13px;font-weight:500;margin-left:auto;flex-shrink:0;padding-left:10px;}
.day-balance.pos{color:var(--income)}.day-balance.neg{color:var(--expense)}.day-balance.zero{color:var(--text3)}
.day-expand-icon{color:var(--text3);font-size:12px;margin-left:6px;flex-shrink:0;transition:transform .2s}
.week-day-row.open .day-expand-icon{transform:rotate(180deg)}
.tx-list{border-top:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .3s ease;}
.week-day-row.open .tx-list{max-height:1000px}
.tx-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);}
.tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tx-dot.income{background:var(--income)}.tx-dot.expense{background:var(--expense)}
.tx-memo{flex:1;font-size:13px;color:var(--text)}
.tx-cat{font-size:11px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:20px;white-space:nowrap}
.tx-amount{font-family:var(--mono);font-size:13px;font-weight:500}
.tx-amount.income{color:var(--income)}.tx-amount.expense{color:var(--expense)}
.tx-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.tx-del:hover{color:var(--expense)}
.add-tx-row{padding:10px 14px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.02);}

/* MONTHLY CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem;}
.cal-head{text-align:center;font-size:11px;font-weight:700;padding:6px 0;color:var(--text3);letter-spacing:0.5px;}
.cal-head:first-child{color:#ff6b6b}.cal-head:last-child{color:#6b9eff}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);min-height:72px;padding:6px;cursor:pointer;transition:all .15s;position:relative;}
.cal-cell:hover{background:var(--surface2);border-color:var(--border2)}
.cal-cell.empty{background:transparent;border-color:transparent;pointer-events:none}
.cal-cell.today-cell{border-color:var(--accent)}.cal-cell.selected-cell{background:var(--surface3);border-color:var(--accent);border-width:1.5px}
.cal-date{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.cal-cell.today-cell .cal-date{color:var(--accent);font-weight:700}
.sun-col .cal-date{color:#ff6b6b}.sat-col .cal-date{color:#6b9eff}
.cal-inc{font-family:var(--mono);font-size:10px;color:var(--income);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-exp{font-family:var(--mono);font-size:10px;color:var(--expense);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-dot-row{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
.cal-dot{width:5px;height:5px;border-radius:50%}
.month-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;}
.month-detail-title{font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--text2)}
.detail-empty{text-align:center;color:var(--text3);font-size:13px;padding:2rem 0}
.detail-tx-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.detail-tx-item:last-child{border-bottom:none}
.bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:.75rem}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* HISTORY TAB */
.history-filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--border2);background:var(--surface2)}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.filter-btn.income-f.active{background:var(--income-bg);color:var(--income);border-color:var(--income)}
.filter-btn.expense-f.active{background:var(--expense-bg);color:var(--expense);border-color:var(--expense)}
.history-section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.history-section-title span{font-size:11px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}
.history-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.history-item:hover{border-color:var(--border2)}
.hi-date{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:52px;flex-shrink:0}
.hi-rank{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text3);min-width:22px;flex-shrink:0;text-align:center}
.hi-rank.r1{color:var(--accent)}.hi-rank.r2{color:var(--text2)}.hi-rank.r3{color:#b08030}
.hi-memo{flex:1;font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-cat{font-size:11px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.hi-amount{font-family:var(--mono);font-size:14px;font-weight:500;flex-shrink:0}
.hi-amount.income{color:var(--income)}.hi-amount.expense{color:var(--expense)}
.hi-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.hi-del:hover{color:var(--expense)}
.stat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;}
.stat-label{font-size:11px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:var(--mono);font-size:20px;font-weight:500}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.cat-breakdown{display:flex;flex-direction:column;gap:6px;}
.cat-row{display:flex;align-items:center;gap:10px;}
.cat-row-name{font-size:12px;color:var(--text2);min-width:48px}
.cat-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--expense),#ff9999);transition:width .8s ease;}
.cat-bar-fill.income{background:linear-gradient(90deg,var(--income),#99ffcc);}
.cat-row-val{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:72px;text-align:right}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:.75rem}

/* FORM */
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem;}
.form-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:1rem;letter-spacing:.3px;text-transform:uppercase}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:11px;color:var(--text3);letter-spacing:.3px}
.form-field input,.form-field select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:8px 12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;appearance:none;-webkit-appearance:none;}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field input::placeholder{color:var(--text3)}
.form-field.date input,.form-field.amount input{font-family:var(--mono)}
.type-toggle{display:flex;gap:0;border:1px solid var(--border2);border-radius:var(--r-sm);overflow:hidden}
.type-btn{flex:1;padding:8px 14px;border:none;background:var(--surface2);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;}
.type-btn.income.active{background:var(--income-bg);color:var(--income)}
.type-btn.expense.active{background:var(--expense-bg);color:var(--expense)}
.btn-submit{padding:9px 22px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#000;font-weight:700;font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;align-self:flex-end;height:36px;}
.btn-submit:hover{background:#f5d44e;transform:translateY(-1px)}.btn-submit:active{transform:none}
.cat-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.cat-tag{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;}
.cat-tag.expense-cat.active{border-color:var(--expense);color:var(--expense);background:rgba(255,107,107,.08)}
.cat-tag.income-cat.active{border-color:var(--income);color:var(--income);background:rgba(74,222,154,.08)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;width:100%;max-width:420px;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--text)}
.modal-form{display:flex;flex-direction:column;gap:12px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-form .form-field input,.modal-form .form-field select{width:100%}
.modal-form .type-toggle{width:100%}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-cancel{flex:1;padding:9px;border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{background:var(--surface2)}.btn-confirm{flex:1}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:640px){.summary-grid{grid-template-columns:1fr}.stat-cards{grid-template-columns:1fr}.form-row{flex-direction:column}.form-field input,.form-field select{min-width:0;width:100%}.cal-cell{min-height:52px}.cal-inc,.cal-exp{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">Money<span>Book</span></div>
  <span class="today-badge" id="header-today"></span>
</header>
<div class="tabs">
  <button class="tab active" id="tab-weekly" onclick="switchTab('weekly')">주간</button>
  <button class="tab" id="tab-monthly" onclick="switchTab('monthly')">월간</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">내역 분석</button>
</div>
<div class="main">

  <!-- ── WEEKLY ── -->
  <div class="section active" id="sec-weekly">
    <div class="summary-grid" id="week-summary"></div>
    <div class="nav-ctrl">
      <div class="nav-title" id="week-nav-title"></div>
      <div class="nav-btns">
        <button class="btn-nav" onclick="prevWeek()">‹</button>
        <button class="btn-today" onclick="goThisWeek()">이번 주</button>
        <button class="btn-nav" onclick="nextWeek()">›</button>
      </div>
    </div>
    <div class="week-grid" id="week-grid"></div>
    <div class="form-panel">
      <div class="form-title">내역 추가</div>
      <div class="form-row">
        <div class="form-field date"><label>날짜</label><input type="date" id="w-date"/></div>
        <div class="form-field"><label>유형</label>
          <div class="type-toggle">
            <button class="type-btn expense active" id="w-type-exp" onclick="setType('w','expense')">지출</button>
            <button class="type-btn income" id="w-type-inc" onclick="setType('w','income')">수입</button>
          </div>
        </div>
        <div class="form-field amount"><label>금액 (원)</label><input type="number" id="w-amount" placeholder="0" min="0" step="100"/></div>
        <div class="form-field" style="flex:2;min-width:140px"><label>메모</label><input type="text" id="w-memo" placeholder="예: 점심 식사"/></div>
        <button class="btn-submit" onclick="addTxFromWeekForm()">추가</button>
      </div>
      <div class="cat-list" id="w-cats"></div>
    </div>
  </div>

  <!-- ── MONTHLY ── -->
  <div class="section" id="sec-monthly">
    <div class="summary-grid" id="month-summary"></div>
    <div class="nav-ctrl">
      <div class="nav-title" id="month-nav-title"></div>
      <div class="nav-btns">
        <button class="btn-nav" onclick="prevMonth()">‹</button>
        <button class="btn-today" onclick="goThisMonth()">이번 달</button>
        <button class="btn-nav" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="month-detail" id="month-detail">
      <div class="month-detail-title" id="month-detail-title">날짜를 클릭해 내역을 확인하세요</div>
      <div id="month-detail-body"><div class="detail-empty"><div class="empty-icon">📅</div>달력에서 날짜를 선택하면<br>해당 날짜의 내역이 표시됩니다</div></div>
    </div>
  </div>

  <!-- ── HISTORY ── -->
  <div class="section" id="sec-history">
    <div class="history-filters">
      <button class="filter-btn active" id="hf-week" onclick="setHistoryPeriod('week')">이번 주</button>
      <button class="filter-btn" id="hf-month" onclick="setHistoryPeriod('month')">이번 달</button>
      <button class="filter-btn" id="hf-3month" onclick="setHistoryPeriod('3month')">최근 3개월</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="filter-btn expense-f active" id="hf-expense" onclick="toggleHistoryType('expense')">지출</button>
        <button class="filter-btn income-f active" id="hf-income" onclick="toggleHistoryType('income')">수입</button>
      </div>
    </div>
    <div id="history-content"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-date-title">내역 추가</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-form">
      <div class="form-field"><label>유형</label>
        <div class="type-toggle">
          <button class="type-btn expense active" id="m-type-exp" onclick="setType('m','expense')">지출</button>
          <button class="type-btn income" id="m-type-inc" onclick="setType('m','income')">수입</button>
        </div>
      </div>
      <div class="modal-row">
        <div class="form-field amount"><label>금액 (원)</label><input type="number" id="m-amount" placeholder="0" min="0" step="100"/></div>
        <div class="form-field"><label>카테고리</label><select id="m-cat"></select></div>
      </div>
      <div class="form-field"><label>메모</label><input type="text" id="m-memo" placeholder="예: 편의점"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModalDirect()">취소</button>
        <button class="btn-submit btn-confirm" onclick="addTxFromModal()">추가</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATS_EXPENSE=['식비','교통','쇼핑','문화','의료','구독','카페','주거','기타'];
const CATS_INCOME=['월급','용돈','알바','이체','기타'];
const STORAGE_KEY='moneybook_v3';
const DAY_NAMES=['일','월','화','수','목','금','토'];
const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const CAT_COLORS=['#ff6b6b','#ffaa4a','#e8c547','#4ade9a','#4ab8ff','#b08fff','#ff7eb3','#59c9c9','#aaaaaa'];

let db=loadDB();
function loadDB(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return {};}}
function saveDB(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}
function getDay(ds){return db[ds]||[];}
function addTx(ds,type,amount,memo,cat){
  if(!db[ds])db[ds]=[];
  db[ds].push({id:String(Date.now()+Math.random()),type,amount:Number(amount),memo,cat});
  saveDB();
}
function delTx(ds,id){
  if(!db[ds])return;
  db[ds]=db[ds].filter(t=>String(t.id)!==String(id));
  if(!db[ds].length)delete db[ds];
  saveDB();
}
function toDateStr(d){return d.toLocaleDateString('sv-SE');}
function today(){return toDateStr(new Date());}
function fmtMoney(n){return(n>=0?'+':'')+n.toLocaleString('ko-KR')+'원';}

// seed
function seedDummy(){
  const now=new Date();
  [{d:0,type:'expense',amount:8500,memo:'점심 식사',cat:'식비'},
   {d:0,type:'expense',amount:1500,memo:'버스',cat:'교통'},
   {d:-1,type:'income',amount:50000,memo:'용돈',cat:'용돈'},
   {d:-1,type:'expense',amount:22000,memo:'저녁 회식',cat:'식비'},
   {d:-2,type:'expense',amount:15000,memo:'카페 스터디',cat:'카페'},
   {d:-3,type:'income',amount:300000,memo:'알바비',cat:'알바'},
   {d:-3,type:'expense',amount:45000,memo:'옷 구매',cat:'쇼핑'},
   {d:-4,type:'expense',amount:5000,memo:'지하철',cat:'교통'},
   {d:-5,type:'expense',amount:12000,memo:'영화 관람',cat:'문화'},
   {d:-6,type:'expense',amount:8000,memo:'편의점',cat:'식비'},
   {d:-8,type:'expense',amount:35000,memo:'식료품',cat:'식비'},
   {d:-10,type:'income',amount:1200000,memo:'월급',cat:'월급'},
   {d:-12,type:'expense',amount:60000,memo:'운동화',cat:'쇼핑'},
   {d:-15,type:'expense',amount:9900,memo:'넷플릭스',cat:'구독'},
  ].forEach(s=>{
    const d2=new Date(now);d2.setDate(now.getDate()+s.d);
    const ds=toDateStr(d2);
    if(!db[ds]||!db[ds].find(t=>t.memo===s.memo))addTx(ds,s.type,s.amount,s.memo,s.cat);
  });
}
if(!Object.keys(db).length)seedDummy();

// header date
document.getElementById('header-today').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
document.getElementById('w-date').value=today();
document.getElementById('w-date').min='2020-01-01';

// ── TABS ──
function switchTab(tab){
  ['weekly','monthly','history'].forEach(t=>{
    document.getElementById('sec-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='history')renderHistory();
}

// ── SUMMARY ──
function renderSummary(elId,inc,exp){
  const net=inc-exp;
  document.getElementById(elId).innerHTML=`
    <div class="sum-card income"><div class="sum-label">수입</div><div class="sum-value">+${inc.toLocaleString()}</div><div class="sum-sub">원</div></div>
    <div class="sum-card expense"><div class="sum-label">지출</div><div class="sum-value">-${exp.toLocaleString()}</div><div class="sum-sub">원</div></div>
    <div class="sum-card total"><div class="sum-label">잔액</div><div class="sum-value">${net>=0?'+':''}${net.toLocaleString()}</div><div class="sum-sub">원</div></div>`;
}

// ── WEEKLY ──
let wOffset=0,wType='expense',wCat='';

function getWeekRange(offset){
  const d=new Date(),dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-dow+(dow===0?-6:1)+offset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{mon,sun};
}
function prevWeek(){wOffset--;renderWeek();}
function nextWeek(){wOffset++;renderWeek();}
function goThisWeek(){wOffset=0;renderWeek();}

function setType(prefix,type){
  if(prefix==='w'){wType=type;renderWeekCats();}
  else{mType=type;renderModalCatSelect();}
  document.getElementById(prefix+'-type-exp').classList.toggle('active',type==='expense');
  document.getElementById(prefix+'-type-inc').classList.toggle('active',type==='income');
}
function renderWeekCats(){
  const cats=wType==='expense'?CATS_EXPENSE:CATS_INCOME;
  document.getElementById('w-cats').innerHTML=cats.map(c=>`<span class="cat-tag ${wType==='expense'?'expense-cat':'income-cat'}${wCat===c?' active':''}" onclick="toggleCat('${c}')">${c}</span>`).join('');
}
function toggleCat(c){wCat=(wCat===c)?'':c;renderWeekCats();}

function renderWeek(){
  const{mon}=getWeekRange(wOffset);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('week-nav-title').textContent=
    `${mon.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} – ${sun.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}`;

  // remember open rows
  const openRows=new Set();
  document.querySelectorAll('.week-day-row.open').forEach(el=>{
    const ds=el.id.replace('wrow-','');openRows.add(ds);
  });

  let totalInc=0,totalExp=0;
  const rows=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=toDateStr(d);
    const txs=getDay(ds);
    const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
    const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
    totalInc+=inc;totalExp+=exp;
    rows.push({d,ds,txs,inc,exp,dow:d.getDay()});
  }
  renderSummary('week-summary',totalInc,totalExp);

  const todayStr=today();
  document.getElementById('week-grid').innerHTML=rows.map(r=>{
    const bal=r.inc-r.exp;
    const balStr=bal===0?'–':fmtMoney(bal);
    const balCls=bal>0?'pos':bal<0?'neg':'zero';
    const isToday=r.ds===todayStr;
    const dowCls=r.dow===0?'day-sun':r.dow===6?'day-sat':'';
    const chips=r.txs.slice(0,3).map(t=>`<span class="tx-chip ${t.type}">${t.type==='income'?'+':'-'}${t.amount.toLocaleString()}</span>`).join('');
    const moreBadge=r.txs.length>3?`<span class="tx-chip expense">+${r.txs.length-3}건</span>`:'';
    const shouldOpen=isToday&&wOffset===0||openRows.has(r.ds);
    const txItems=r.txs.map(t=>`
      <div class="tx-item" id="txi-${t.id}">
        <span class="tx-dot ${t.type}"></span>
        <span class="tx-memo">${t.memo||'메모 없음'}</span>
        <span class="tx-cat">${t.cat||''}</span>
        <span class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${t.amount.toLocaleString()}원</span>
        <button class="tx-del" onclick="deleteTxWeek('${r.ds}','${t.id}')" title="삭제">✕</button>
      </div>`).join('');
    const emptyMsg=r.txs.length===0?`<div style="padding:12px 14px;font-size:12px;color:var(--text3)">내역 없음</div>`:'';
    return `
    <div class="week-day-row${isToday?' today-row':''}${shouldOpen?' open':''}" id="wrow-${r.ds}">
      <div class="week-day-header ${dowCls}" onclick="toggleRow('${r.ds}')">
        <div class="day-num">${r.d.getDate()}</div>
        <div class="day-name">${DAY_NAMES[r.dow]}</div>
        <div class="day-transactions">${chips}${moreBadge}</div>
        <div class="day-balance ${balCls}">${balStr}</div>
        <div class="day-expand-icon">▾</div>
      </div>
      <div class="tx-list" id="txlist-${r.ds}">${txItems}${emptyMsg}
        <div class="add-tx-row"><span style="font-size:11px;color:var(--text3);cursor:pointer" onclick="openModalForDate('${r.ds}')">+ 이 날 내역 추가</span></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('w-date').value=todayStr;
  renderWeekCats();
}

function toggleRow(ds){document.getElementById('wrow-'+ds).classList.toggle('open');}

// KEY FIX: delete without re-rendering whole grid — just remove the item element and update chips/balance
function deleteTxWeek(ds,id){
  delTx(ds,id);
  // Remove just the deleted item from DOM
  const itemEl=document.getElementById('txi-'+id);
  if(itemEl)itemEl.remove();
  // Update the row's chip preview and balance without closing it
  const row=document.getElementById('wrow-'+ds);
  if(!row)return;
  const txs=getDay(ds);
  const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const bal=inc-exp;
  const balStr=bal===0?'–':fmtMoney(bal);
  const balCls=bal>0?'pos':bal<0?'neg':'zero';
  // update chips
  const chips=txs.slice(0,3).map(t=>`<span class="tx-chip ${t.type}">${t.type==='income'?'+':'-'}${t.amount.toLocaleString()}</span>`).join('');
  const moreBadge=txs.length>3?`<span class="tx-chip expense">+${txs.length-3}건</span>`:'';
  const chipEl=row.querySelector('.day-transactions');
  if(chipEl)chipEl.innerHTML=chips+moreBadge;
  const balEl=row.querySelector('.day-balance');
  if(balEl){balEl.textContent=balStr;balEl.className='day-balance '+balCls;}
  // close row and clear chips if no transactions remain
  if(txs.length===0){
    row.classList.remove('open');
    const chipEl2=row.querySelector('.day-transactions');
    if(chipEl2)chipEl2.innerHTML='';
  }
  // update week summary
  let totalInc=0,totalExp=0;
  const{mon}=getWeekRange(wOffset);
  for(let i=0;i<7;i++){
    const d2=new Date(mon);d2.setDate(mon.getDate()+i);
    const txs2=getDay(toDateStr(d2));
    totalInc+=txs2.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
    totalExp+=txs2.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  }
  renderSummary('week-summary',totalInc,totalExp);
  renderMonthly();
}

function addTxFromWeekForm(){
  const ds=document.getElementById('w-date').value;
  const amount=document.getElementById('w-amount').value;
  const memo=document.getElementById('w-memo').value.trim();
  if(!ds||!amount||Number(amount)<=0){alert('날짜와 금액을 입력해 주세요.');return;}
  addTx(ds,wType,amount,memo,wCat);
  document.getElementById('w-amount').value='';
  document.getElementById('w-memo').value='';
  wCat='';
  renderWeek();renderMonthly();
}

// ── MONTHLY ──
let mYear=new Date().getFullYear(),mMonth=new Date().getMonth(),mType='expense',selectedDay=null;
function prevMonth(){if(--mMonth<0){mMonth=11;mYear--;}renderMonthly();}
function nextMonth(){if(++mMonth>11){mMonth=0;mYear++;}renderMonthly();}
function goThisMonth(){mYear=new Date().getFullYear();mMonth=new Date().getMonth();renderMonthly();}

function renderMonthly(){
  document.getElementById('month-nav-title').textContent=`${mYear}년 ${MONTH_NAMES[mMonth]}`;
  const daysInMonth=new Date(mYear,mMonth+1,0).getDate();
  let totalInc=0,totalExp=0;const dayData={};
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${mYear}-${String(mMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const txs=getDay(ds);
    const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
    const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
    totalInc+=inc;totalExp+=exp;dayData[d]={txs,inc,exp,ds};
  }
  renderSummary('month-summary',totalInc,totalExp);
  const firstDow=new Date(mYear,mMonth,1).getDay(),todayStr=today();
  let html='';
  ['일','월','화','수','목','금','토'].forEach(n=>{html+=`<div class="cal-head">${n}</div>`;});
  for(let i=0;i<firstDow;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dow=(firstDow+d-1)%7;
    const{txs,inc,exp,ds}=dayData[d];
    const isToday=ds===todayStr,isSel=selectedDay&&selectedDay===ds;
    const sunCls=dow===0?'sun-col':'',satCls=dow===6?'sat-col':'';
    const dots=txs.slice(0,5).map(t=>`<span class="cal-dot ${t.type}"></span>`).join('');
    html+=`<div class="cal-cell ${sunCls} ${satCls}${isToday?' today-cell':''}${isSel?' selected-cell':''}" onclick="selectDay('${ds}')">
      <div class="cal-date">${d}</div>
      ${inc>0?`<div class="cal-inc">+${inc.toLocaleString()}</div>`:''}
      ${exp>0?`<div class="cal-exp">-${exp.toLocaleString()}</div>`:''}
      <div class="cal-dot-row">${dots}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(selectedDay)renderDayDetail(selectedDay);
}

function selectDay(ds){selectedDay=ds;renderMonthly();openModalForDate(ds);}

function renderDayDetail(ds){
  const txs=getDay(ds);const d=new Date(ds);
  const title=`${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_NAMES[d.getDay()]})`;
  document.getElementById('month-detail-title').textContent=title;
  if(!txs.length){
    document.getElementById('month-detail-body').innerHTML=`<div class="detail-empty"><div class="empty-icon">💸</div>이 날 내역이 없습니다<br><span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="openModalForDate('${ds}')">+ 내역 추가</span></div>`;
    return;
  }
  const inc=txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const pct=exp>0&&(inc+exp)>0?Math.round(exp/(inc+exp)*100):0;
  document.getElementById('month-detail-body').innerHTML=
    txs.map(t=>`<div class="detail-tx-item">
      <span class="tx-dot ${t.type}" style="width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0"></span>
      <span class="tx-cat">${t.cat||''}</span>
      <span style="flex:1;font-size:13px">${t.memo||'메모 없음'}</span>
      <span class="tx-amount ${t.type}" style="font-family:var(--mono);font-size:13px;font-weight:500">${t.type==='income'?'+':'-'}${t.amount.toLocaleString()}원</span>
      <button class="tx-del" onclick="deleteTxM('${ds}','${t.id}')" title="삭제">✕</button>
    </div>`).join('')+
    (exp>0?`<div style="margin-top:10px"><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--expense),#ff9999)"></div></div><div style="font-size:11px;color:var(--text3);margin-top:4px">지출 비율 ${pct}%</div></div>`:'')+
    `<div style="text-align:right;margin-top:10px"><span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="openModalForDate('${ds}')">+ 추가</span></div>`;
}

function deleteTxM(ds,id){delTx(ds,id);renderDayDetail(ds);renderMonthly();}

// ── MODAL ──
let modalDate='';
function openModalForDate(ds){
  modalDate=ds;const d=new Date(ds);
  document.getElementById('modal-date-title').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_NAMES[d.getDay()]}) 내역 추가`;
  mType='expense';
  document.getElementById('m-type-exp').classList.add('active');
  document.getElementById('m-type-inc').classList.remove('active');
  renderModalCatSelect();
  document.getElementById('m-amount').value='';
  document.getElementById('m-memo').value='';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-amount').focus(),100);
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}
function renderModalCatSelect(){
  const cats=mType==='expense'?CATS_EXPENSE:CATS_INCOME;
  document.getElementById('m-cat').innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function addTxFromModal(){
  const amount=document.getElementById('m-amount').value;
  const memo=document.getElementById('m-memo').value.trim();
  const cat=document.getElementById('m-cat').value;
  if(!amount||Number(amount)<=0){alert('금액을 입력해 주세요.');return;}
  addTx(modalDate,mType,amount,memo,cat);
  closeModalDirect();
  renderWeek();renderMonthly();
  if(selectedDay===modalDate)renderDayDetail(modalDate);
}

// ── HISTORY / ANALYTICS ──
let historyPeriod='week';
let historyShowExpense=true;
let historyShowIncome=true;

function setHistoryPeriod(p){
  historyPeriod=p;
  ['week','month','3month'].forEach(x=>{
    document.getElementById('hf-'+x).classList.toggle('active',x===p);
  });
  renderHistory();
}
function toggleHistoryType(type){
  if(type==='expense')historyShowExpense=!historyShowExpense;
  else historyShowIncome=!historyShowIncome;
  document.getElementById('hf-expense').classList.toggle('active',historyShowExpense);
  document.getElementById('hf-income').classList.toggle('active',historyShowIncome);
  renderHistory();
}

function getPeriodDates(){
  const now=new Date();now.setHours(0,0,0,0);
  if(historyPeriod==='week'){
    const dow=now.getDay();
    const mon=new Date(now);mon.setDate(now.getDate()-dow+(dow===0?-6:1));
    return{start:mon,end:now};
  }
  if(historyPeriod==='month'){
    return{start:new Date(now.getFullYear(),now.getMonth(),1),end:now};
  }
  // 3month
  const s=new Date(now);s.setMonth(now.getMonth()-3);
  return{start:s,end:now};
}

function getAllTxInPeriod(){
  const{start,end}=getPeriodDates();
  const all=[];
  for(const ds in db){
    const d=new Date(ds);
    if(d>=start&&d<=end){
      db[ds].forEach(t=>all.push({...t,ds,date:new Date(ds)}));
    }
  }
  return all;
}

function renderHistory(){
  const all=getAllTxInPeriod();
  const expenses=all.filter(t=>t.type==='expense');
  const incomes=all.filter(t=>t.type==='income');
  const totalExp=expenses.reduce((a,t)=>a+t.amount,0);
  const totalInc=incomes.reduce((a,t)=>a+t.amount,0);
  const net=totalInc-totalExp;

  // period label
  const{start,end}=getPeriodDates();
  const periodLabel=`${start.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} ~ ${end.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}`;

  // category breakdown (expense)
  const catMap={};
  expenses.forEach(t=>{
    const c=t.cat||'기타';
    catMap[c]=(catMap[c]||0)+t.amount;
  });
  const catSorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=catSorted[0]?catSorted[0][1]:1;

  const catBreakdownHTML=catSorted.length?catSorted.map((c,i)=>`
    <div class="cat-row">
      <span class="cat-row-name">${c[0]}</span>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${Math.round(c[1]/maxCat*100)}%;background:${CAT_COLORS[i%CAT_COLORS.length]}"></div></div>
      <span class="cat-row-val">${c[1].toLocaleString()}원</span>
    </div>`).join(''):`<div style="color:var(--text3);font-size:13px">지출 내역이 없습니다</div>`;

  // top spending items (sorted by amount desc)
  const topExpenses=[...expenses].sort((a,b)=>b.amount-a.amount);
  const topIncomes=[...incomes].sort((a,b)=>b.amount-a.amount);

  const rankClass=i=>i===0?'r1':i===1?'r2':i===2?'r3':'';

  const expListHTML=topExpenses.length?topExpenses.slice(0,20).map((t,i)=>`
    <div class="history-item">
      <span class="hi-rank ${rankClass(i)}">${i+1}</span>
      <span class="hi-date">${t.date.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
      <span class="hi-memo">${t.memo||'메모 없음'}</span>
      <span class="hi-cat">${t.cat||''}</span>
      <span class="hi-amount expense">-${t.amount.toLocaleString()}원</span>
      <button class="hi-del" onclick="deleteFromHistory('${t.ds}','${t.id}')" title="삭제">✕</button>
    </div>`).join(''):`<div class="empty-state"><div class="empty-icon">🎉</div>지출 내역이 없습니다</div>`;

  const incListHTML=topIncomes.length?topIncomes.slice(0,20).map((t,i)=>`
    <div class="history-item">
      <span class="hi-rank ${rankClass(i)}">${i+1}</span>
      <span class="hi-date">${t.date.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
      <span class="hi-memo">${t.memo||'메모 없음'}</span>
      <span class="hi-cat">${t.cat||''}</span>
      <span class="hi-amount income">+${t.amount.toLocaleString()}원</span>
      <button class="hi-del" onclick="deleteFromHistory('${t.ds}','${t.id}')" title="삭제">✕</button>
    </div>`).join(''):`<div class="empty-state"><div class="empty-icon">💸</div>수입 내역이 없습니다</div>`;

  // avg per day
  const days=Math.max(1,Math.round((end-start)/86400000)+1);
  const avgExpPerDay=Math.round(totalExp/days);

  document.getElementById('history-content').innerHTML=`
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-label">기간 총 지출</div>
        <div class="stat-value" style="color:var(--expense)">-${totalExp.toLocaleString()}원</div>
        <div class="stat-sub">${periodLabel}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">기간 총 수입</div>
        <div class="stat-value" style="color:var(--income)">+${totalInc.toLocaleString()}원</div>
        <div class="stat-sub">${periodLabel}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">순 잔액</div>
        <div class="stat-value" style="color:${net>=0?'var(--income)':'var(--expense)'}">${net>=0?'+':''}${net.toLocaleString()}원</div>
        <div class="stat-sub">수입 - 지출</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">일평균 지출</div>
        <div class="stat-value" style="color:var(--text2)">${avgExpPerDay.toLocaleString()}원</div>
        <div class="stat-sub">${days}일 기준</div>
      </div>
    </div>

    ${historyShowExpense?`
    <div class="history-section-title">카테고리별 지출 <span>${periodLabel}</span></div>
    <div class="cat-breakdown" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.5rem">${catBreakdownHTML}</div>
    <div class="history-section-title">💸 많이 쓴 순서 <span>${topExpenses.length}건</span></div>
    <div class="history-list">${expListHTML}</div>`:''}

    ${historyShowIncome?`
    <div class="history-section-title">💰 수입 내역 <span>${topIncomes.length}건</span></div>
    <div class="history-list">${incListHTML}</div>`:''}
  `;
}

function deleteFromHistory(ds,id){
  delTx(ds,id);
  renderHistory();
  renderWeek();
  renderMonthly();
}

// keyboard shortcuts
document.getElementById('m-amount').addEventListener('keydown',e=>{if(e.key==='Enter')addTxFromModal();});
document.getElementById('m-memo').addEventListener('keydown',e=>{if(e.key==='Enter')addTxFromModal();});
document.getElementById('w-memo').addEventListener('keydown',e=>{if(e.key==='Enter')addTxFromWeekForm();});

// init
renderWeek();
renderMonthly();
</script>
</body>
</html>
